        <!-- for search engines -->
        <meta
            content="SpessaSynth is a powerful MIDI Player and SoundFont2 / DLS Synthesizer with MIDI editing capabilites.
        It allows to play MIDI files with .sf2 files and .dls files and convert dls to sf2 online for free without any ads!
        Supports MIDI files, XMF or Mobile XMF (MXMF) files, RMIDI files with embedded SF2 or DLS soundfonts and has full support for both playing and converting MIDI, SF2 and DLS and back!
        Featuring advanced MIDI Controller with controller such as volume, pan or low-pass filter cutoff. Written in vanilla JavaScript"
            name="description"
        />
        <meta content="spessasus" name="author" />
        <meta
            content="midi, soundfont, sf2,
        synth, synthesizer, soundfont2, midi player, midi player online, player, sf3, dls, rmidi, mid, rmi,

        midi soundfont player online,
        sf2 player, sf2 player online, soundfont player online
        dls to sf2, dls to sf2 converter, sf2 to dls, sf2 to dls converter"
            name="keywords"
        />
